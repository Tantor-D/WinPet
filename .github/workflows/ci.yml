name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WinPet.sln --configfile NuGet.Config

      - name: Build
        run: dotnet build WinPet.sln --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: |
          $projects = @(
            "tests/WinPet.Core.Tests/WinPet.Core.Tests.csproj",
            "tests/WinPet.Infrastructure.Tests/WinPet.Infrastructure.Tests.csproj",
            "tests/WinPet.Platform.Windows.Tests/WinPet.Platform.Windows.Tests.csproj",
            "tests/WinPet.Desktop.Tests/WinPet.Desktop.Tests.csproj"
          )
          foreach ($project in $projects) {
            dotnet test $project `
              --configuration Release `
              --no-build `
              --no-restore `
              --blame-hang-timeout 2m
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Dependency vulnerability scan
        shell: pwsh
        run: ./scripts/check-vulnerabilities.ps1
